name: Desktop Release

# Triggered two ways:
#   1. push a tag matching desktop-v*  →  builds for every matrix platform
#      and uploads the artifacts to a GitHub Release of the same name.
#      Keeps this completely separate from the PyPI release flow in
#      release.yml (which is triggered by v* tags).
#   2. workflow_dispatch (manual button on the Actions tab) → builds and
#      uploads the artifacts to the workflow run only; useful for testing
#      pipeline changes without publishing.
#
# What the job actually does:
#   - Checkout the repo
#   - Install Python 3.11, Rust stable, Node (for cargo tauri icon's deps)
#   - Cache cargo to keep iteration fast on retries
#   - Install the Tauri CLI 2.x
#   - Generate platform icons from web/public/favicon.png (so we don't
#     have to commit ~6 binary blobs)
#   - Run sidecar/build_sidecar.py — pip-installs the collector +
#     pyinstaller, freezes the collector to a single per-triple binary
#   - Run `cargo tauri build` — picks up the frozen binary from
#     src-tauri/binaries/ via the externalBin declaration and bundles
#     everything into the .msi / .dmg / .AppImage
#   - Upload artifacts

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:
    inputs:
      draft_release:
        description: "Create a draft release with the artifacts (true/false)"
        required: false
        default: "false"

concurrency:
  group: desktop-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: "msi nsis"
          # macOS Apple Silicon only. Intel Mac (macos-13) dropped — every
          # Mac shipped since late 2020 is arm64, runners are scarce, and
          # the .dmg almost doubled total release storage for shrinking
          # audience. Not code-signed/notarized — Gatekeeper warning
          # bypassed via right-click → Open (or `xattr -d
          # com.apple.quarantine /Applications/Memento.app`).
          - os: macos-latest
            target: aarch64-apple-darwin
            bundles: "app dmg"
          # Linux — AppImage works everywhere, .deb for Ubuntu/Debian.
          # ubuntu-22.04 pins to glibc 2.35, broadly compatible (newer
          # ubuntu-24.04 would link 2.39 and break older distros).
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: "appimage deb"

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write  # so we can attach assets to a release on tag push

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Setup Rust (stable + target ${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust + Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri-collector/src-tauri
          # bump if cargo cache gets weirdly stuck
          prefix-key: "v1-${{ matrix.target }}"

      - name: Install Linux system deps (webkit2gtk + tray + AppImage tooling)
        if: matrix.os == 'ubuntu-22.04'
        # DEBIAN_FRONTEND=noninteractive + apt -o Dpkg::Options::="--force-confnew"
        # prevent dpkg from prompting on config-file conflicts. Without it,
        # the runner hangs forever on tzdata / libssl-dev. needrestart=a
        # auto-answers the "what services to restart" prompt.
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            -o Dpkg::Options::=--force-confnew \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            patchelf \
            file \
            build-essential

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Generate platform icons from web favicon
        working-directory: tauri-collector/src-tauri
        run: cargo tauri icon ../../web/public/favicon.png

      - name: Build sidecars (PyInstaller frozen collector + MCP)
        working-directory: tauri-collector/sidecar
        # Force utf-8 on Windows stdout — the helper script prints `→` /
        # `✓` etc. which trip the default cp1252 codec on the Windows
        # runner. PYTHONIOENCODING is honored by every print() call.
        env:
          PYTHONIOENCODING: utf-8
          PYTHONUTF8: "1"
        run: |
          set -e
          python -m pip install --upgrade pip
          # Two frozen binaries get built:
          #   - memento-collector-sidecar : file-watcher daemon
          #   - memento-mcp-sidecar       : MCP server for AI IDEs
          # Each has its own .spec; build_sidecar.py runs PyInstaller twice.
          python -m pip install -e ../../mcp_server -e ../../collector pyinstaller
          python build_sidecar.py

      - name: Tauri build (signed)
        working-directory: tauri-collector
        # TAURI_SIGNING_PRIVATE_KEY is the contents of the minisign-format
        # ed25519 secret key generated locally (`minisign -G -p tauri.pub
        # -s tauri.key -W`). Passing it here makes `cargo tauri build`
        # write a .sig next to each installer; the auto-updater plugin
        # verifies that signature against the pubkey we ship in
        # tauri.conf.json, so an unsigned/malicious update can't be
        # installed even over compromised HTTP.
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build --target ${{ matrix.target }} --bundles ${{ matrix.bundles }}

      - name: Build manifest fragment for this platform
        # Each platform runner writes its own JSON fragment keyed by the
        # Tauri-updater target name (windows-x86_64 / darwin-aarch64 /
        # linux-x86_64). The final `publish-manifest` job merges all
        # fragments into one cross-platform latest.json that Tauri 2.x
        # updater clients fetch and find their OS's entry in.
        #
        # Per-platform updater artifact picks:
        #   - Windows: NSIS .exe (in-place replace, unlike .msi)
        #   - macOS:   .app.tar.gz (compressed bundle, signed by Tauri
        #              when createUpdaterArtifacts is true)
        #   - Linux:   .AppImage.tar.gz wrapper
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        working-directory: tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle
        env:
          MATRIX_TARGET: ${{ matrix.target }}
          GH_REPO: ${{ github.repository }}
          GH_TAG: ${{ github.ref_name }}
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          set -eu
          shopt -s nullglob
          case "$MATRIX_TARGET" in
            x86_64-pc-windows-msvc)   key="windows-x86_64";  artifact=$(ls nsis/*-setup.exe | head -n1) ;;
            aarch64-apple-darwin)     key="darwin-aarch64";  artifact=$(ls macos/*.app.tar.gz | head -n1) ;;
            x86_64-apple-darwin)      key="darwin-x86_64";   artifact=$(ls macos/*.app.tar.gz | head -n1) ;;
            x86_64-unknown-linux-gnu) key="linux-x86_64";    artifact=$(ls appimage/*.AppImage | head -n1) ;;
            *) echo "::error::Unknown target $MATRIX_TARGET"; exit 1 ;;
          esac
          [ -n "$artifact" ] || { echo "::error::No updater artifact for $MATRIX_TARGET"; ls -R .; exit 1; }
          sig="${artifact}.sig"
          [ -f "$sig" ] || { echo "::error::Missing signature at $sig"; exit 1; }

          base="https://github.com/${GH_REPO}/releases/download/${GH_TAG}"
          fname=$(basename "$artifact")
          out="${GH_WORKSPACE}/_fragments/${key}.json"
          mkdir -p "$(dirname "$out")"
          python3 - "$key" "$base/$fname" "$sig" "$out" <<'PY'
          import json, sys
          key, url, sig_path, out = sys.argv[1:5]
          with open(sig_path) as f:
              sig = f.read()
          with open(out, "w") as f:
              json.dump({key: {"url": url, "signature": sig}}, f, indent=2)
          print("Wrote", out)
          PY

      - name: Upload manifest fragment
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: actions/upload-artifact@v4
        with:
          name: manifest-fragment-${{ matrix.target }}
          path: _fragments/*.json
          if-no-files-found: error

      - name: Locate built artifacts
        id: bundle
        working-directory: tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle
        run: |
          shopt -s nullglob
          echo "msi=$(ls msi/*.msi 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          echo "nsis=$(ls nsis/*.exe 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          echo "dmg=$(ls dmg/*.dmg 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          echo "appimage=$(ls appimage/*.AppImage 2>/dev/null | head -n1)" >> "$GITHUB_OUTPUT"
          ls -R .

      - name: Upload artifacts to workflow run
        uses: actions/upload-artifact@v4
        with:
          name: memento-desktop-${{ matrix.target }}
          path: |
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
          if-no-files-found: warn
          retention-days: 14

      - name: Create / update Release (tag push only)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          # All installer artifacts + updater bundles (the .tar.gz / .sig
          # pairs the auto-updater fetches and verifies). latest.json is
          # written separately by the publish-manifest job below.
          files: |
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            tauri-collector/src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
          make_latest: "true"  # always mark desktop releases as "latest" so the
                                # updater endpoint URL (.../releases/latest/...) resolves
          fail_on_unmatched_files: false

  # ── After all platform builds: merge per-platform fragments into one
  # cross-platform latest.json and attach to the release. Auto-update
  # clients on Windows / macOS / Linux all read this single file and
  # find their OS entry under "platforms".
  publish-manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all manifest fragments
        uses: actions/download-artifact@v4
        with:
          pattern: manifest-fragment-*
          path: _fragments
          merge-multiple: true

      - name: Merge fragments → latest.json
        env:
          GH_REPO: ${{ github.repository }}
          GH_TAG: ${{ github.ref_name }}
        run: |
          set -eu
          version="${GH_TAG#desktop-v}"
          python3 - "$version" "$GH_REPO" "$GH_TAG" <<'PY'
          import datetime, glob, json, sys
          version, repo, tag = sys.argv[1:4]
          platforms = {}
          for f in sorted(glob.glob("_fragments/*.json")):
              platforms.update(json.load(open(f)))
          manifest = {
              "version": version,
              "notes": f"See release notes at https://github.com/{repo}/releases/tag/{tag}",
              "pub_date": datetime.datetime.now(datetime.timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ"),
              "platforms": platforms,
          }
          with open("latest.json", "w") as f:
              json.dump(manifest, f, indent=2)
          print(json.dumps(manifest, indent=2))
          PY

      - name: Upload latest.json to release
        uses: softprops/action-gh-release@v2
        with:
          files: latest.json
          tag_name: ${{ github.ref_name }}
          fail_on_unmatched_files: true
